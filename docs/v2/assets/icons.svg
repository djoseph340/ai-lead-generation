    <circle cx="12" cy="8" r="1.5" fill="currentColor"/>
  </symbol>

  <!-- Cost/Money Icon -->
  <symbol id="icon-cost" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
