    <circle cx="12" cy="16" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M10 10l-1 4M14 10l1 4M8 10v4M16 10v4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </symbol>

