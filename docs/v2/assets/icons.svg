    <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1"/>
  </symbol>

  <!-- Cloud Icon -->
  <symbol id="icon-cloud" viewBox="0 0 24 24">
    <path d="M19 14c1.1 0 2-.9 2-2 0-1-.9-2-2-2h-.5C17 9 15.6 8 14 8c-1 0-2 .5-2.6 1.3-.3-.2-.7-.3-1.1-.3-1.7 0-3 1.3-3 3 0 .3 0 .6.1.8C6.7 12.5 6 13.6 6 15c0 2.2 1.8 4 4 4h9z" stroke="currentColor" stroke-width="1" fill="none"/>
  </symbol>

  <!-- Info Icon -->
  <symbol id="icon-info" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
    <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="16" r="0.5" fill="currentColor"/>
  </symbol>

  <!-- Warning Icon -->
  <symbol id="icon-warning" viewBox="0 0 24 24">
    <path d="M1 21h22L12 2 1 21z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="17" r="0.5" fill="currentColor"/>
  </symbol>

