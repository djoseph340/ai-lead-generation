    <path d="M8 8h8M8 12h8M8 16h4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- Sheet/Table Icon -->
  <symbol id="icon-sheet" viewBox="0 0 24 24">
    <rect x="2" y="2" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"/>
    <line x1="2" y1="8" x2="22" y2="8" stroke="currentColor" stroke-width="1"/>
    <line x1="2" y1="14" x2="22" y2="14" stroke="currentColor" stroke-width="1"/>
    <line x1="8" y1="2" x2="8" y2="22" stroke="currentColor" stroke-width="1"/>
    <line x1="14" y1="2" x2="14" y2="22" stroke="currentColor" stroke-width="1"/>
  </symbol>

