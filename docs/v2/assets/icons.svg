    <circle cx="19" cy="8" r="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <circle cx="19" cy="16" r="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <circle cx="12" cy="21" r="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <circle cx="5" cy="16" r="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <circle cx="5" cy="8" r="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </symbol>

  <!-- Check Circle Icon -->
