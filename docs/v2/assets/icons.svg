    <line x1="12" y1="6" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="16" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Security/Lock Icon -->
  <symbol id="icon-lock" viewBox="0 0 24 24">
    <rect x="4" y="10" width="16" height="10" stroke="currentColor" stroke-width="2" fill="none" rx="2"/>
    <path d="M6 10V8a6 6 0 0 1 12 0v2" stroke="currentColor" stroke-width="2" fill="none"/>
    <circle cx="12" cy="15" r="1.5" fill="currentColor"/>
  </symbol>

