<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- Webhook/Link Icon -->
  <symbol id="icon-webhook" viewBox="0 0 24 24">
    <circle cx="6" cy="12" r="2" fill="currentColor"/>
    <circle cx="18" cy="12" r="2" fill="currentColor"/>
    <path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- Checkmark Icon -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Duplicate/Sync Icon -->
  <symbol id="icon-duplicate" viewBox="0 0 24 24">
    <path d="M4 4v10h10M20 14v6H10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M20 14l-3-3" stroke="currentColor" stroke-width="2" fill="none"/>
  </symbol>

  <!-- Chart/Graph Icon -->
  <symbol id="icon-chart" viewBox="0 0 24 24">
    <rect x="3" y="14" width="2" height="7" fill="currentColor"/>
    <rect x="9" y="10" width="2" height="11" fill="currentColor"/>
    <rect x="15" y="6" width="2" height="15" fill="currentColor"/>
  </symbol>

  <!-- Target/Goal Icon -->
  <symbol id="icon-target" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
    <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
    <circle cx="12" cy="12" r="2" fill="currentColor"/>
  </symbol>

  <!-- Document/Profile Icon -->
  <symbol id="icon-document" viewBox="0 0 24 24">
