  <symbol id="icon-filter" viewBox="0 0 24 24">
    <path d="M4 6h16v2L12 15v7l-4-2v-5L4 8V6z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
  </symbol>

  <!-- Search Icon -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" fill="none"/>
    <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- Layers Icon -->
  <symbol id="icon-layers" viewBox="0 0 24 24">
    <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.5" fill="none"/>
